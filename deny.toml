# cargo-deny configuration: license + advisory + source gates.
[advisories]
version = 2
yanked = "deny"
# Scoped, documented advisory exceptions (reviewed — not blanket-ignored).
ignore = [
    # paste: unmaintained (RUSTSEC-2024-0436). Pulled in transitively (ratatui /
    # cel-interpreter), a compile-time-only proc-macro with no runtime code and no
    # known vulnerability. Accepted until the upstreams migrate off it.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Permissive licenses only (this project is Apache-2.0).
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    # CDLA-Permissive-2.0: the Mozilla trusted-root CA bundle (`webpki-roots`),
    # pulled by the network-proxy TLS stack (hyper-rustls / tokio-tungstenite). A
    # permissive *data* license for the root list — reviewed and accepted. The
    # TLS crypto deps (ring, aws-lc-sys) are already Apache-2.0/ISC, no exception
    # needed for them.
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
