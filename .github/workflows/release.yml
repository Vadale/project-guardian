# Release pipeline (ROADMAP §9.3). On a `v*` tag, build the `guardian` CLI for
# macOS / Linux / Windows and attach the (unsigned) archives to the GitHub Release.
#
# Code signing + notarization are NOT here: they require the maintainer's certificates
# as repo secrets (Apple Developer ID + `notarytool`, Windows code-signing). See
# docs/packaging.md for the signing steps to add once those secrets exist. Until then
# these are **unsigned** developer builds. (This workflow first runs on a real tag —
# it does not gate PRs.)
name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build guardian (release)
        run: cargo build --release --locked -p guardian-cli --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          tar -C target/${{ matrix.target }}/release -czf guardian-${{ matrix.target }}.tar.gz guardian
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/guardian.exe -DestinationPath guardian-${{ matrix.target }}.zip
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            guardian-${{ matrix.target }}.tar.gz
            guardian-${{ matrix.target }}.zip
