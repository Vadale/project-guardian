name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Forbid unsafe in our crates (§9.1)
        run: |
          miss=0
          for f in crates/*/src/lib.rs crates/*/src/main.rs; do
            [ -f "$f" ] || continue
            grep -q 'forbid(unsafe_code)' "$f" || { echo "MISSING #![forbid(unsafe_code)]: $f"; miss=1; }
          done
          test "$miss" = 0
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all --all-features

  # Cross-platform build/test on Windows (§9b.3): compiles the named-pipe IPC path
  # and runs the daemon's IPC tests over a real Windows named pipe.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (daemon IPC + workspace)
        run: cargo test --workspace --all-features

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
