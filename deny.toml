# cargo-deny configuration: license + advisory + source gates.
[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses only (this project is Apache-2.0).
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
