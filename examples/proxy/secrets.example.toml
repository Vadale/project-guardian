# Example token-broker secrets for the network proxy.
#
# Copy to `secrets.toml`, `chmod 600` it, and put the real token in. Guardian
# attaches it as `Authorization: Bearer <token>` ONLY on a request the policy
# allows, and ONLY to the matching host — the agent never sees it. Files matching
# `*secrets*.toml` are gitignored (the `.example.toml` is the committed template).
#
# Key = the destination host, normalized (lowercase, default port stripped), i.e.
# exactly `action.context.host`.

"account.example-bank.test" = "REPLACE_WITH_YOUR_API_TOKEN"
