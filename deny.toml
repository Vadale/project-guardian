# cargo-deny configuration: license + advisory + source gates.
[advisories]
version = 2
yanked = "deny"
# Scoped, documented advisory exceptions (reviewed — not blanket-ignored).
ignore = [
    # paste: unmaintained (RUSTSEC-2024-0436). Pulled in transitively (ratatui /
    # cel-interpreter), a compile-time-only proc-macro with no runtime code and no
    # known vulnerability. Accepted until the upstreams migrate off it.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Permissive licenses only (this project is Apache-2.0).
allow = [
    "Apache-2.0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
