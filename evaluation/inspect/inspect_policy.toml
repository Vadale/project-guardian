# Least-privilege policy for the Inspect runs (AgentDojo + AgentThreatBench).
# Read-only tools are allowed; everything else falls to the default and the Inspect
# approver rejects it (deny-by-default). Covers all suites without enumerating every
# tool: read-style prefixes are allowed, state-changing / send / write / delete are not.
version = 1
role = "inspect-least-privilege"

[defaults]
decision = "ask"          # the Inspect approver treats non-allow as reject (fail-closed)

[[rules]]
id = "allow-readonly"
when = '''action.tool.startsWith("get_") || action.tool.startsWith("search_") || action.tool.startsWith("read_") || action.tool.startsWith("list_") || action.tool.startsWith("check_") || action.tool.startsWith("lookup_") || action.tool.startsWith("categorize_") || action.tool.startsWith("draft_") || action.tool == "memory_read"'''
decision = "allow"

# Explicit deny rules (clearer audit reasons; default would reject these anyway).
[[rules]]
id = "deny-send-and-exfil"
when = '''action.tool.startsWith("send_") || action.tool.startsWith("post_") || action.tool.startsWith("share_") || action.tool == "invite_user_to_slack" || action.tool == "add_user_to_channel"'''
decision = "deny"
critical = true
explain = "Sends or shares data outside (exfiltration path)."

[[rules]]
id = "deny-money-and-reserve"
when = '''action.tool == "send_money" || action.tool.startsWith("schedule_") || action.tool.startsWith("reserve_") || action.tool.startsWith("update_")'''
decision = "deny"
critical = true
explain = "Moves money, books a paid reservation, or changes account state."

[[rules]]
id = "deny-write-delete-memory"
when = '''action.tool.startsWith("create_") || action.tool.startsWith("delete_") || action.tool.startsWith("append_") || action.tool.startsWith("cancel_") || action.tool.startsWith("reschedule_") || action.tool == "memory_write" || action.tool == "resolve_ticket" || action.tool == "store_util" || action.tool == "remove_user_from_slack"'''
decision = "deny"
critical = true
explain = "Creates/deletes/alters files, calendar, memory, or tickets."
